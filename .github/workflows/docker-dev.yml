name: Build and Test Docker Image (dev)

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - dev
jobs:
  build-and-test: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # 1. Image LOKAL bauen (noch nicht pushen!)
      - name: Build local for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Lädt das Image in den lokalen Docker-Daemon des Runners
          tags: lighttpd-webserver:test

      # 2. LOKAL testen
      - name: Run test
        run: |
          docker run -d --name test-server -p 8080:8080 lighttpd-webserver:test
          sleep 5
          curl -f http://127.0.0.1:8080 | grep 'It works!'
          docker stop test-server

      # 3. LOGIN (nur wenn Test erfolgreich)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. PUSH (jetzt erst in die Registry)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false # Verhindert ungetaggte Meta-Shas
          tags: ghcr.io/${{ github.repository_owner }}/lighttpd-webserver:dev


