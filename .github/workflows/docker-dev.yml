name: Build and Test Docker Image (dev)

on:
  push:
    branches:
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lighttpd-webserver:dev

      - name: Run container and test
        run: |
          docker run -d --name test-webserver -p 8080:8080 ghcr.io/${{ github.repository_owner }}/lighttpd-webserver:dev
          sleep 5
          curl -f http://127.0.0.1:8080 | grep 'It works! (lighttpd)'
          docker stop test-webserver
          docker rm test-webserver
