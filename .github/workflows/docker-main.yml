name: Build and Push Docker Image (main)

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Check if this run is for a tag and set VERSION
        id: check_tag
        run: |
          if [[ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            echo "is_tag=true" >> $GITHUB_ENV
          else
            echo "is_tag=false" >> $GITHUB_ENV
          fi

      - name: Build local image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: local/lighttpd-webserver:${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (only for tag refs)
        if: env.is_tag == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lighttpd-webserver:${{ env.VERSION }}

      - name: Run container and test
        run: |
          if [ "${{ env.is_tag }}" = "true" ]; then
            IMAGE=ghcr.io/${{ github.repository_owner }}/lighttpd-webserver:${{ env.VERSION }}
          else
            IMAGE=local/lighttpd-webserver:${{ github.sha }}
          fi
          docker run -d --name test-webserver -p 8080:8080 $IMAGE
          sleep 5
          curl -f http://127.0.0.1:8080 | grep 'It works! (lighttpd)'
          docker stop test-webserver
          docker rm test-webserver
